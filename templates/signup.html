{% extends "base.html" %}
{% block title %}Sign Up – UPI FraudShield{% endblock %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <h2>Create Account</h2>
    {% if error %}<div class="alert danger">{{ error }}</div>{% endif %}
    
    <form method="POST">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="Your Name" required/>
      
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required/>
      
      <label>Password</label>
      <input type="password" name="password" placeholder="Minimum 6 characters" minlength="6" required/>
      
      <div class="role-selector">
        <label>Register as:</label>
        <div class="role-options">
          <label class="role-option">
            <input type="radio" name="role" value="user" checked>
            <span class="role-badge user">User</span>
            <small>Report fraud, check UPI, analyze transactions</small>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="admin">
            <span class="role-badge admin">Admin</span>
            <small>Manage reports, block UPIs, view analytics</small>
          </label>
        </div>
      </div>
      
      <button type="submit" class="btn-primary full">Create Account</button>
    </form>
    
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</div>

<style>
.role-selector {
  margin: 20px 0;
}

.role-selector > label {
  display: block;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--text);
}

.role-options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.role-option {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 12px 15px;
  border: 2px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
  background: var(--card);
}

.role-option:hover {
  border-color: var(--primary);
  background: rgba(37, 99, 235, 0.05);
}

.role-option input[type="radio"] {
  width: 18px;
  height: 18px;
  margin: 0;
  cursor: pointer;
}

.role-badge {
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
}

.role-badge.user {
  background: #dbeafe;
  color: #1d4ed8;
}

.role-badge.admin {
  background: #fef3c7;
  color: #d97706;
}

.role-option small {
  font-size: 0.75rem;
  color: var(--muted);
  margin-left: auto;
}
</style>

{% endblock %}
